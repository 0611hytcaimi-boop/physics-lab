<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光电效应 - 物理虚拟实验平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--cyan:#58a6ff;--green:#3fb950;--orange:#d29922;--red:#f85149;--purple:#a371f7;--yellow:#e3b341}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI','Microsoft YaHei',sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.back-btn{color:var(--text2);text-decoration:none;font-size:14px;display:flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;transition:all .2s}
.back-btn:hover{color:var(--text);background:var(--bg3)}
.back-btn::before{content:'';display:inline-block;width:8px;height:8px;border-left:2px solid currentColor;border-bottom:2px solid currentColor;transform:rotate(45deg)}
.header h1{font-size:18px;font-weight:600}.header .badge{font-size:12px;color:var(--text2);background:var(--bg3);padding:2px 10px;border-radius:10px;margin-left:auto}
.main{display:flex;flex:1;overflow:hidden}
.canvas-wrap{flex:1;position:relative;background:var(--bg)}
#canvas{width:100%;height:100%;display:block}
.panel{width:300px;background:var(--bg2);border-left:1px solid var(--border);padding:16px;overflow-y:auto;flex-shrink:0}
.panel h2{font-size:14px;color:var(--text2);margin-bottom:12px;font-weight:500}
.ctrl-group{margin-bottom:12px}
.ctrl-group label{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:4px}
.ctrl-group label span{color:var(--cyan);font-weight:500}
input[type=range]{width:100%;height:4px;-webkit-appearance:none;appearance:none;background:var(--bg3);border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--cyan);border:2px solid var(--bg2);cursor:pointer;transition:box-shadow .2s}
input[type=range]::-webkit-slider-thumb:hover{box-shadow:0 0 12px rgba(88,166,255,.4)}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--cyan);border:2px solid var(--bg2);cursor:pointer}
.btn-row{display:flex;gap:8px;margin-bottom:16px}
.btn{padding:8px 18px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit;flex:1}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:hover{box-shadow:0 0 16px rgba(63,185,80,.35)}
.btn-primary.active{background:var(--orange)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{box-shadow:0 0 16px rgba(248,81,73,.35)}
.readout{border-top:1px solid var(--border);padding-top:12px;margin-top:4px}
.readout-row{display:flex;justify-content:space-between;font-size:13px;padding:2px 0}
.readout-row .label{color:var(--text2)}
.readout-row .value{font-family:'JetBrains Mono',monospace;font-weight:500}
.val-cyan{color:var(--cyan)}.val-green{color:var(--green)}.val-orange{color:var(--orange)}.val-red{color:var(--red)}.val-purple{color:var(--purple)}.val-yellow{color:var(--yellow)}
.panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-track{background:transparent}
.panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@media(max-width:768px){.main{flex-direction:column}.panel{width:100%;max-height:40vh;border-left:none;border-top:1px solid var(--border)}}
</style>
</head>
<body>
<div class="header">
  <a href="../index.html" class="back-btn">返回</a>
  <h1>光电效应</h1>
  <span class="badge">Photoelectric Effect</span>
</div>
<div class="main">
  <div class="canvas-wrap"><canvas id="canvas"></canvas></div>
  <div class="panel">
    <h2>参数控制</h2>
    <div class="btn-row">
      <button class="btn btn-primary" id="playBtn">▶ 照射</button>
      <button class="btn btn-danger" id="resetBtn">↺ 重置</button>
    </div>
    <div class="ctrl-group">
      <label>波长 λ <span id="wlVal">400</span> nm</label>
      <input type="range" id="wlSlider" min="200" max="700" step="5" value="400">
    </div>
    <div class="ctrl-group">
      <label>光强度 <span id="intVal">5</span></label>
      <input type="range" id="intSlider" min="1" max="10" step="1" value="5">
    </div>
    <div class="ctrl-group">
      <label>逸出功 W <span id="workVal">2.0</span> eV</label>
      <input type="range" id="workSlider" min="1" max="5" step="0.1" value="2.0">
    </div>
    <div class="readout">
      <h2>测量数据</h2>
      <div class="readout-row"><span class="label">光子能量</span><span class="value val-cyan" id="rPhotonE">— eV</span></div>
      <div class="readout-row"><span class="label">电子最大动能</span><span class="value val-green" id="rKE">— eV</span></div>
      <div class="readout-row"><span class="label">截止电压</span><span class="value val-orange" id="rVstop">— V</span></div>
      <div class="readout-row"><span class="label">阈值波长</span><span class="value val-red" id="rThresW">— nm</span></div>
      <div class="readout-row"><span class="label">光电流</span><span class="value val-purple" id="rCurrent">—</span></div>
    </div>
  </div>
</div>
<script>
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const playBtn=document.getElementById('playBtn'),resetBtn=document.getElementById('resetBtn');
const wlSlider=document.getElementById('wlSlider'),intSlider=document.getElementById('intSlider'),workSlider=document.getElementById('workSlider');
const rPhotonE=document.getElementById('rPhotonE'),rKE=document.getElementById('rKE');
const rVstop=document.getElementById('rVstop'),rThresW=document.getElementById('rThresW'),rCurrent=document.getElementById('rCurrent');
const wlVal=document.getElementById('wlVal'),intVal=document.getElementById('intVal'),workVal=document.getElementById('workVal');

let W,H,running=false;
let electrons=[];

function resize(){
  const r=canvas.parentElement.getBoundingClientRect(),dpr=window.devicePixelRatio||1;
  W=r.width;H=r.height;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize);

function wavelengthToRGB(wl){
  let r,g,b;
  if(wl>=380&&wl<440){r=-(wl-440)/60;g=0;b=1}
  else if(wl>=440&&wl<490){r=0;g=(wl-440)/50;b=1}
  else if(wl>=490&&wl<510){r=0;g=1;b=-(wl-510)/20}
  else if(wl>=510&&wl<580){r=(wl-510)/70;g=1;b=0}
  else if(wl>=580&&wl<645){r=1;g=-(wl-645)/65;b=0}
  else if(wl>=645&&wl<=780){r=1;g=0;b=0}
  else{r=g=b=0}
  const factor=wl>=380&&wl<420?0.3+0.7*(wl-380)/40:wl>=700?0.3+0.7*(780-wl)/80:1;
  return `rgb(${Math.round(r*255*factor)},${Math.round(g*255*factor)},${Math.round(b*255*factor)})`;
}

function update(dt){
  if(!running)return;
  const wl=+wlSlider.value; // nm
  const intensity=+intSlider.value;
  const workFunc=+workSlider.value; // eV
  const hc=1240; // eV·nm
  const photonE=hc/wl;
  const maxKE=photonE-workFunc;
  if(maxKE>0){
    // Emit electrons
    const emitRate=intensity*(maxKE>0?1:0);
    if(Math.random()<emitRate*dt*10){
      const angle=-Math.PI/2+(Math.random()-0.5)*Math.PI/3;
      const speed=Math.sqrt(maxKE)*0.5;
      electrons.push({x:W*0.35,y:H/2-20+Math.random()*40,vx:speed*Math.cos(angle),vy:speed*Math.sin(angle),life:1});
    }
  }
  // Update electrons
  for(let i=electrons.length-1;i>=0;i--){
    const e=electrons[i];
    e.x+=e.vx*dt*80;
    e.y+=e.vy*dt*80;
    e.life-=dt*0.5;
    if(e.life<=0||e.x>W||e.y<0||e.y>H)electrons.splice(i,1);
  }
  // Readouts
  rPhotonE.textContent=photonE.toFixed(2)+' eV';
  if(maxKE>0){
    rKE.textContent=maxKE.toFixed(3)+' eV';
    rVstop.textContent=maxKE.toFixed(3)+' V';
  }else{
    rKE.textContent='0 eV (无发射)';
    rVstop.textContent='0 V';
  }
  const thresW=hc/workFunc;
  rThresW.textContent=thresW.toFixed(0)+' nm';
  rCurrent.textContent=electrons.length>20?'饱和':(electrons.length+' e⁻');
}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0d1117';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(48,54,61,0.3)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  const wl=+wlSlider.value;
  const workFunc=+workSlider.value;
  const hc=1240;
  const photonE=hc/wl;
  const maxKE=photonE-workFunc;
  // Metal surface (left)
  ctx.fillStyle='#30363d';
  ctx.fillRect(W*0.25,H*0.2,20,H*0.6);
  ctx.fillStyle='#21262d';
  ctx.fillRect(W*0.2,H*0.2,10,H*0.6);
  // Metal surface texture
  ctx.fillStyle='rgba(139,148,158,0.1)';
  for(let y=H*0.25;y<H*0.75;y+=6){
    ctx.fillRect(W*0.22,y,16,2);
  }
  // Label
  ctx.fillStyle='rgba(139,148,158,0.4)';ctx.font='10px sans-serif';ctx.textAlign='center';
  ctx.fillText('金属表面',W*0.23,H*0.88);
  ctx.fillText('W = '+workFunc.toFixed(1)+' eV',W*0.23,H*0.93);

  // Incoming photons
  if(running){
    const color=wavelengthToRGB(wl);
    const intensity=+intSlider.value;
    for(let i=0;i<intensity;i++){
      const y=H*0.2+Math.random()*H*0.6;
      const x=W*0.05+Math.random()*W*0.15;
      ctx.fillStyle=color;
      ctx.globalAlpha=0.6+Math.random()*0.4;
      ctx.beginPath();ctx.arc(x+i*8%W*0.1,y,4,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
      // Wavy lines representing light
      ctx.strokeStyle=color;ctx.lineWidth=1;ctx.globalAlpha=0.2;
      ctx.beginPath();
      for(let wx=x;wx<W*0.25;wx+=2){
        ctx.lineTo(wx,y+Math.sin((wx+performance.now()/100)*0.2)*6);
      }
      ctx.stroke();ctx.globalAlpha=1;
    }
  }else{
    ctx.fillStyle='rgba(139,148,158,0.3)';ctx.font='12px sans-serif';ctx.textAlign='center';
    ctx.fillText('点击"照射"发射光子',W*0.15,H/2);
  }

  // Emitted electrons
  for(const e of electrons){
    ctx.fillStyle=`rgba(248,81,73,${e.life})`;
    ctx.beginPath();ctx.arc(e.x,e.y,3,0,Math.PI*2);ctx.fill();
  }
  if(electrons.length>0){
    ctx.fillStyle='rgba(248,81,73,0.4)';ctx.font='9px sans-serif';ctx.textAlign='left';
    ctx.fillText('e⁻',electrons[0].x+5,electrons[0].y+3);
  }

  // KE vs frequency graph (small, top right)
  const gx=W-200,gy=20,gw=180,gh=110;
  ctx.fillStyle='rgba(22,27,34,0.9)';ctx.fillRect(gx,gy,gw,gh);
  ctx.strokeStyle='var(--border)';ctx.lineWidth=1;ctx.strokeRect(gx,gy,gw,gh);
  ctx.fillStyle='rgba(139,148,158,0.4)';ctx.font='8px sans-serif';ctx.textAlign='left';
  ctx.fillText('Eₖ - f',gx+4,gy+10);
  // Axes
  ctx.strokeStyle='rgba(139,148,158,0.2)';ctx.lineWidth=1;
  const ax0=gx+40,ay0=gy+gh-20,aw=gw-50,ah=gh-30;
  ctx.beginPath();ctx.moveTo(ax0,ay0);ctx.lineTo(ax0+aw,ay0);ctx.stroke();
  ctx.beginPath();ctx.moveTo(ax0,ay0);ctx.lineTo(ax0,ay0-ah);ctx.stroke();
  // Plot KE = hf - W
  ctx.strokeStyle='rgba(88,166,255,0.8)';ctx.lineWidth=2;
  const fMin=0,fMax=10; // 10^15 Hz
  const keMax=4.14*fMax-workFunc;
  ctx.beginPath();
  for(let i=0;i<100;i++){
    const f=fMin+(fMax-fMin)*i/100;
    const ke=4.14*f-workFunc;
    const x=ax0+(f-fMin)/(fMax-fMin)*aw;
    const y=ay0-ke/keMax*ah;
    i===0?ctx.moveTo(x,y):ke>0?ctx.lineTo(x,y):null;
  }
  ctx.stroke();
  // Threshold frequency marker
  const fThres=workFunc/4.14;
  const tx=ax0+(fThres-fMin)/(fMax-fMin)*aw;
  ctx.strokeStyle='rgba(248,81,73,0.4)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(tx,ay0);ctx.lineTo(tx,ay0-ah);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='rgba(248,81,73,0.4)';ctx.font='7px sans-serif';ctx.textAlign='center';
  ctx.fillText('f₀',tx,ay0+8);
  // Current frequency marker
  const fCurrent=hc/wl/4.14;
  const cx2=ax0+(fCurrent-fMin)/(fMax-fMin)*aw;
  ctx.strokeStyle='rgba(63,185,80,0.6)';ctx.lineWidth=1;ctx.setLineDash([2,2]);
  ctx.beginPath();ctx.moveTo(cx2,ay0);ctx.lineTo(cx2,ay0-ah);ctx.stroke();ctx.setLineDash([]);
}

function resetSim(){
  electrons.length=0;running=false;
  playBtn.textContent='▶ 照射';playBtn.classList.remove('active');
}
function togglePlay(){
  running=!running;
  playBtn.textContent=running?'⏸ 停止':'▶ 照射';
  playBtn.classList.toggle('active',running);
}
playBtn.addEventListener('click',togglePlay);
resetBtn.addEventListener('click',resetSim);
wlSlider.addEventListener('input',()=>wlVal.textContent=(+wlSlider.value).toFixed(0));
intSlider.addEventListener('input',()=>intVal.textContent=(+intSlider.value).toFixed(0));
workSlider.addEventListener('input',()=>workVal.textContent=(+workSlider.value).toFixed(1));
document.addEventListener('keydown',e=>{if(e.key===' '||e.key==='Space'){e.preventDefault();togglePlay()}});

let lastTime=0;
const FIXED_DT=1/60;
function loop(t){
  requestAnimationFrame(loop);
  if(lastTime===0)lastTime=t;
  let ft=(t-lastTime)/1000;lastTime=t;
  if(ft>.1)ft=.1;
  update(FIXED_DT);
  draw();
}
resize();resetSim();loop(0);
</script>
</body>
</html>
