
<!DOCTYPE html>

    <script>
class CelestialBody {
    constructor(mass, x, y, vx, vy, color) {
        this.mass = mass;
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.color = color;
        this.trail = [];
        this.maxTrailLength = 500;
    }

    addToTrail(x, y) {
        this.trail.push({ x, y });
        if (this.trail.length > this.maxTrailLength) {
            this.trail.shift();
        }
    }

    clearTrail() {
        this.trail = [];
    }
}

class ThreeBodySimulation {
    constructor() {
        this.canvas = document.getElementById('mainCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.width = this.canvas.width;
        this.height = this.canvas.height;
        
        this.bodies = [];
        this.time = 0;
        this.steps = 0;
        this.isRunning = false;
        this.animationId = null;
        
        this.integrationMethod = 'rk4';
        this.dt = 0.01;
        
        this.showTrails = true;
        this.showInfo = true;
        
        this.baseScale = 150;
        this.scale = this.baseScale;
        this.offsetX = this.width / 2;
        this.offsetY = this.height / 2;
        this.centerX = 0;
        this.centerY = 0;
        
        this.isDragging = false;
        this.lastMouseX = 0;
        this.lastMouseY = 0;
        
        this.initBodies();
        this.setupEventListeners();
        this.render();
    }

    initBodies() {
        this.bodies = [
            new CelestialBody(1.0, -1.0, 0.0, 0.0, 0.5, '#ff6464'),
            new CelestialBody(1.0, 1.0, 0.0, 0.0, -0.5, '#64ff64'),
            new CelestialBody(1.0, 0.0, 1.0, 0.0, 0.0, '#6464ff')
        ];
    }

    setupEventListeners() {
        document.getElementById('integrationMethod').addEventListener('change', (e) => {
            this.integrationMethod = e.target.value;
            document.getElementById('methodInfo').textContent = this.getMethodName();
        });

        document.getElementById('timeStep').addEventListener('input', (e) => {
            this.dt = parseFloat(e.target.value);
        });

        document.getElementById('showTrails').addEventListener('change', (e) => {
            this.showTrails = e.target.checked;
        });

        document.getElementById('showInfo').addEventListener('change', (e) => {
            this.showInfo = e.target.checked;
            document.getElementById('infoPanel').style.display = this.showInfo ? 'block' : 'none';
        });

        document.getElementById('zoomSlider').addEventListener('input', (e) => {
            this.scale = parseFloat(e.target.value);
            this.updateZoomInfo();
            if (!this.isRunning) this.render();
        });

        document.getElementById('centerX').addEventListener('input', (e) => {
            this.centerX = parseFloat(e.target.value);
            if (!this.isRunning) this.render();
        });

        document.getElementById('centerY').addEventListener('input', (e) => {
            this.centerY = parseFloat(e.target.value);
            if (!this.isRunning) this.render();
        });

        this.canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            this.scale *= delta;
            this.scale = Math.max(20, Math.min(500, this.scale));
            document.getElementById('zoomSlider').value = this.scale;
            this.updateZoomInfo();
            if (!this.isRunning) this.render();
        });

        this.canvas.addEventListener('mousedown', (e) => {
            this.isDragging = true;
            this.lastMouseX = e.clientX;
            this.lastMouseY = e.clientY;
            this.canvas.style.cursor = 'grabbing';
        });

        document.addEventListener('mousemove', (e) => {
            if (this.isDragging) {
                const dx = e.clientX - this.lastMouseX;
                const dy = e.clientY - this.lastMouseY;
                this.offsetX += dx;
                this.offsetY += dy;
                this.lastMouseX = e.clientX;
                this.lastMouseY = e.clientY;
                if (!this.isRunning) this.render();
            }
        });

        document.addEventListener('mouseup', () => {
            this.isDragging = false;
            this.canvas.style.cursor = 'default';
        });

        ['m1', 'm2', 'm3', 'x1', 'x2', 'x3', 'y1', 'y2', 'y3', 'vx1', 'vx2', 'vx3', 'vy1', 'vy2', 'vy3'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                this.updateBodiesFromUI();
            });
        });
    }

    updateZoomInfo() {
        document.getElementById('zoomInfo').textContent = Math.round(this.scale) + '%';
    }

    getMethodName() {
        const names = {
            'euler': '欧拉法',
            'rk4': 'RK4',
            'verlet': 'Verlet'
        };
        return names[this.integrationMethod] || this.integrationMethod;
    }

    updateBodiesFromUI() {
        const bodies = this.bodies;
        bodies[0].mass = parseFloat(document.getElementById('m1').value);
        bodies[0].x = parseFloat(document.getElementById('x1').value);
        bodies[0].y = parseFloat(document.getElementById('y1').value);
        bodies[0].vx = parseFloat(document.getElementById('vx1').value);
        bodies[0].vy = parseFloat(document.getElementById('vy1').value);

        bodies[1].mass = parseFloat(document.getElementById('m2').value);
        bodies[1].x = parseFloat(document.getElementById('x2').value);
        bodies[1].y = parseFloat(document.getElementById('y2').value);
        bodies[1].vx = parseFloat(document.getElementById('vx2').value);
        bodies[1].vy = parseFloat(document.getElementById('vy2').value);

        bodies[2].mass = parseFloat(document.getElementById('m3').value);
        bodies[2].x = parseFloat(document.getElementById('x3').value);
        bodies[2].y = parseFloat(document.getElementById('y3').value);
        bodies[2].vx = parseFloat(document.getElementById('vx3').value);
        bodies[2].vy = parseFloat(document.getElementById('vy3').value);
    }

    clearAllTrails() {
        this.bodies.forEach(b => b.clearTrail());
        this.time = 0;
        this.steps = 0;
    }

    getAcceleration(bodyIndex) {
        const body = this.bodies[bodyIndex];
        let ax = 0, ay = 0;
        
        for (let i = 0; i < this.bodies.length; i++) {
            if (i !== bodyIndex) {
                const other = this.bodies[i];
                const dx = other.x - body.x;
                const dy = other.y - body.y;
                const r = Math.sqrt(dx * dx + dy * dy);
                const r3 = r * r * r;
                ax += other.mass * dx / r3;
                ay += other.mass * dy / r3;
            }
        }
        
        return { ax, ay };
    }

    eulerStep() {
        const newPositions = [];
        
        for (let i = 0; i < this.bodies.length; i++) {
            const body = this.bodies[i];
            const { ax, ay } = this.getAcceleration(i);
            
            newPositions.push({
                x: body.x + body.vx * this.dt,
                y: body.y + body.vy * this.dt,
                vx: body.vx + ax * this.dt,
                vy: body.vy + ay * this.dt
            });
        }
        
        for (let i = 0; i < this.bodies.length; i++) {
            this.bodies[i].addToTrail(this.bodies[i].x, this.bodies[i].y);
            this.bodies[i].x = newPositions[i].x;
            this.bodies[i].y = newPositions[i].y;
            this.bodies[i].vx = newPositions[i].vx;
            this.bodies[i].vy = newPositions[i].vy;
        }
    }

    rk4Step() {
        const n = this.bodies.length;
        const k1v = [], k1x = [];
        const k2v = [], k2x = [];
        const k3v = [], k3x = [];
        const k4v = [], k4x = [];

        for (let i = 0; i < n; i++) {
            const { ax, ay } = this.getAcceleration(i);
            k1v.push({ vx: ax * this.dt, vy: ay * this.dt });
            k1x.push({ x: this.bodies[i].vx * this.dt, y: this.bodies[i].vy * this.dt });
        }

        const originalPositions = this.bodies.map(b => ({ x: b.x, y: b.y, vx: b.vx, vy: b.vy }));
        for (let i = 0; i < n; i++) {
            this.bodies[i].x = originalPositions[i].x + k1x[i].x * 0.5;
            this.bodies[i].y = originalPositions[i].y + k1x[i].y * 0.5;
            this.bodies[i].vx = originalPositions[i].vx + k1v[i].vx * 0.5;
            this.bodies[i].vy = originalPositions[i].vy + k1v[i].vy * 0.5;
        }

        for (let i = 0; i < n; i++) {
            const { ax, ay } = this.getAcceleration(i);
            k2v.push({ vx: ax * this.dt, vy: ay * this.dt });
            k2x.push({ x: this.bodies[i].vx * this.dt, y: this.bodies[i].vy * this.dt });
        }

        for (let i = 0; i < n; i++) {
            this.bodies[i].x = originalPositions[i].x + k2x[i].x * 0.5;
            this.bodies[i].y = originalPositions[i].y + k2x[i].y * 0.5;
            this.bodies[i].vx = originalPositions[i].vx + k2v[i].vx * 0.5;
            this.bodies[i].vy = originalPositions[i].vy + k2v[i].vy * 0.5;
        }

        for (let i = 0; i < n; i++) {
            const { ax, ay } = this.getAcceleration(i);
            k3v.push({ vx: ax * this.dt, vy: ay * this.dt });
            k3x.push({ x: this.bodies[i].vx * this.dt, y: this.bodies[i].vy * this.dt });
        }

        for (let i = 0; i < n; i++) {
            this.bodies[i].x = originalPositions[i].x + k3x[i].x;
            this.bodies[i].y = originalPositions[i].y + k3x[i].y;
            this.bodies[i].vx = originalPositions[i].vx + k3v[i].vx;
            this.bodies[i].vy = originalPositions[i].vy + k3v[i].vy;
        }

        for (let i = 0; i < n; i++) {
            const { ax, ay } = this.getAcceleration(i);
            k4v.push({ vx: ax * this.dt, vy: ay * this.dt });
            k4x.push({ x: this.bodies[i].vx * this.dt, y: this.bodies[i].vy * this.dt });
        }

        for (let i = 0; i < n; i++) {
            this.bodies[i].addToTrail(this.bodies[i].x, this.bodies[i].y);
            this.bodies[i].x = originalPositions[i].x + (k1x[i].x + 2*k2x[i].x + 2*k3x[i].x + k4x[i].x) / 6;
            this.bodies[i].y = originalPositions[i].y + (k1x[i].y + 2*k2x[i].y + 2*k3x[i].y + k4x[i].y) / 6;
            this.bodies[i].vx = originalPositions[i].vx + (k1v[i].vx + 2*k2v[i].vx + 2*k3v[i].vx + k4v[i].vx) / 6;
            this.bodies[i].vy = originalPositions[i].vy + (k1v[i].vy + 2*k2v[i].vy + 2*k3v[i].vy + k4v[i].vy) / 6;
        }
    }

    verletStep() {
        const n = this.bodies.length;
        const accelerations = [];
        
        for (let i = 0; i < n; i++) {
            accelerations.push(this.getAcceleration(i));
        }

        const newPositions = [];
        for (let i = 0; i < n; i++) {
            const body = this.bodies[i];
            newPositions.push({
                x: body.x + body.vx * this.dt + 0.5 * accelerations[i].ax * this.dt * this.dt,
                y: body.y + body.vy * this.dt + 0.5 * accelerations[i].ay * this.dt * this.dt
            });
        }

        for (let i = 0; i < n; i++) {
            this.bodies[i].addToTrail(this.bodies[i].x, this.bodies[i].y);
            this.bodies[i].x = newPositions[i].x;
            this.bodies[i].y = newPositions[i].y;
        }

        const newAccelerations = [];
        for (let i = 0; i < n; i++) {
            newAccelerations.push(this.getAcceleration(i));
        }

        for (let i = 0; i < n; i++) {
            this.bodies[i].vx += 0.5 * (accelerations[i].ax + newAccelerations[i].ax) * this.dt;
            this.bodies[i].vy += 0.5 * (accelerations[i].ay + newAccelerations[i].ay) * this.dt;
        }
    }

    step() {
        switch (this.integrationMethod) {
            case 'euler':
                this.eulerStep();
                break;
            case 'rk4':
                this.rk4Step();
                break;
            case 'verlet':
                this.verletStep();
                break;
        }
        this.time += this.dt;
        this.steps++;
    }

    worldToScreen(x, y) {
        return {
            sx: (x - this.centerX) * this.scale + this.offsetX,
            sy: -(y - this.centerY) * this.scale + this.offsetY
        };
    }

    render() {
        this.ctx.fillStyle = '#0a0a1a';
        this.ctx.fillRect(0, 0, this.width, this.height);

        this.drawGrid();

        if (this.showTrails) {
            this.drawTrails();
        }

        this.drawBodies();

        this.updateInfo();

        if (this.isRunning) {
            this.step();
            this.animationId = requestAnimationFrame(() => this.render());
        }
    }

    drawGrid() {
        this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
        this.ctx.lineWidth = 1;

        const gridSize = 1;
        const startX = this.centerX - this.offsetX / this.scale;
        const endX = this.centerX + (this.width - this.offsetX) / this.scale;
        const startY = this.centerY - (this.height - this.offsetY) / this.scale;
        const endY = this.centerY + this.offsetY / this.scale;

        for (let x = Math.floor(startX); x <= endX; x += gridSize) {
            const { sx } = this.worldToScreen(x, 0);
            this.ctx.beginPath();
            this.ctx.moveTo(sx, 0);
            this.ctx.lineTo(sx, this.height);
            this.ctx.stroke();
        }

        for (let y = Math.floor(startY); y <= endY; y += gridSize) {
            const { sy } = this.worldToScreen(0, y);
            this.ctx.beginPath();
            this.ctx.moveTo(0, sy);
            this.ctx.lineTo(this.width, sy);
            this.ctx.stroke();
        }

        this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
        this.ctx.beginPath();
        const { sx: originX, sy: originY } = this.worldToScreen(0, 0);
        this.ctx.moveTo(0, originY);
        this.ctx.lineTo(this.width, originY);
        this.ctx.moveTo(originX, 0);
        this.ctx.lineTo(originX, this.height);
        this.ctx.stroke();
    }

    drawTrails() {
        this.bodies.forEach(body => {
            if (body.trail.length < 2) return;

            this.ctx.beginPath();
            const first = this.worldToScreen(body.trail[0].x, body.trail[0].y);
            this.ctx.moveTo(first.sx, first.sy);

            for (let i = 1; i < body.trail.length; i++) {
                const { sx, sy } = this.worldToScreen(body.trail[i].x, body.trail[i].y);
                this.ctx.lineTo(sx, sy);
            }

            this.ctx.strokeStyle = body.color + '40';
            this.ctx.lineWidth = 2;
            this.ctx.stroke();
        });
    }

    drawBodies() {
        this.bodies.forEach(body => {
            const { sx, sy } = this.worldToScreen(body.x, body.y);
            const radius = Math.max(6, Math.sqrt(body.mass) * 6);

            const gradient = this.ctx.createRadialGradient(sx, sy, 0, sx, sy, radius);
            gradient.addColorStop(0, body.color);
            gradient.addColorStop(0.5, body.color + 'cc');
            gradient.addColorStop(1, body.color + '44');

            this.ctx.beginPath();
            this.ctx.arc(sx, sy, radius, 0, Math.PI * 2);
            this.ctx.fillStyle = gradient;
            this.ctx.fill();

            this.ctx.beginPath();
            this.ctx.arc(sx, sy, radius, 0, Math.PI * 2);
            this.ctx.strokeStyle = body.color;
            this.ctx.lineWidth = 2;
            this.ctx.stroke();
        });
    }

    updateInfo() {
        document.getElementById('methodInfo').textContent = this.getMethodName();
        document.getElementById('timeInfo').textContent = this.time.toFixed(2);
        document.getElementById('stepInfo').textContent = this.steps.toString();
    }

    start() {
        if (!this.isRunning) {
            this.isRunning = true;
            document.getElementById('playBtn').textContent = '⏸ 暂停';
            this.render();
        }
    }

    pause() {
        this.isRunning = false;
        if (this.animationId) {
            cancelAnimationFrame(this.animationId);
            this.animationId = null;
        }
        document.getElementById('playBtn').textContent = '▶ 播放';
        this.render();
    }

    togglePlay() {
        if (this.isRunning) {
            this.pause();
        } else {
            this.start();
        }
    }

    reset() {
        this.pause();
        this.updateBodiesFromUI();
        this.clearAllTrails();
        this.render();
    }

    runSingleStep() {
        this.step();
        this.render();
    }

    setView(scale, centerX, centerY) {
        this.scale = scale;
        this.centerX = centerX;
        this.centerY = centerY;
        this.offsetX = this.width / 2;
        this.offsetY = this.height / 2;
        document.getElementById('zoomSlider').value = scale;
        document.getElementById('centerX').value = centerX;
        document.getElementById('centerY').value = centerY;
        this.updateZoomInfo();
    }
}

function stepMethod(bodies, method, dt, trails) {
    const n = bodies.length;
    
    if (method === 'euler') {
        const newPositions = [];
        for (let i = 0; i < n; i++) {
            const body = bodies[i];
            let ax = 0, ay = 0;
            for (let j = 0; j < n; j++) {
                if (j !== i) {
                    const dx = bodies[j].x - body.x;
                    const dy = bodies[j].y - body.y;
                    const r = Math.sqrt(dx * dx + dy * dy);
                    const r3 = r * r * r;
                    ax += bodies[j].mass * dx / r3;
                    ay += bodies[j].mass * dy / r3;
                }
            }
            newPositions.push({
                x: body.x + body.vx * dt,
                y: body.y + body.vy * dt,
                vx: body.vx + ax * dt,
                vy: body.vy + ay * dt
            });
        }
        for (let i = 0; i < n; i++) {
            trails[i].push({ x: bodies[i].x, y: bodies[i].y });
            bodies[i].x = newPositions[i].x;
            bodies[i].y = newPositions[i].y;
            bodies[i].vx = newPositions[i].vx;
            bodies[i].vy = newPositions[i].vy;
        }
    } else if (method === 'rk4') {
        const k1v = [], k1x = [];
        for (let i = 0; i < n; i++) {
            let ax = 0, ay = 0;
            for (let j = 0; j < n; j++) {
                if (j !== i) {
                    const dx = bodies[j].x - bodies[i].x;
                    const dy = bodies[j].y - bodies[i].y;
                    const r = Math.sqrt(dx * dx + dy * dy);
                    const r3 = r * r * r;
                    ax += bodies[j].mass * dx / r3;
                    ay += bodies[j].mass * dy / r3;
                }
            }
            k1v.push({ vx: ax * dt, vy: ay * dt });
            k1x.push({ x: bodies[i].vx * dt, y: bodies[i].vy * dt });
        }

        const orig = bodies.map(b => ({ ...b }));
        for (let i = 0; i < n; i++) {
            bodies[i].x = orig[i].x + k1x[i].x * 0.5;
            bodies[i].y = orig[i].y + k1x[i].y * 0.5;
            bodies[i].vx = orig[i].vx + k1v[i].vx * 0.5;
            bodies[i].vy = orig[i].vy + k1v[i].vy * 0.5;
        }

        const k2v = [], k2x = [];
        for (let i = 0; i < n; i++) {
            let ax = 0, ay = 0;
            for (let j = 0; j < n; j++) {
                if (j !== i) {
                    const dx = bodies[j].x - bodies[i].x;
                    const dy = bodies[j].y - bodies[i].y;
                    const r = Math.sqrt(dx * dx + dy * dy);
                    const r3 = r * r * r;
                    ax += bodies[j].mass * dx / r3;
                    ay += bodies[j].mass * dy / r3;
                }
            }
            k2v.push({ vx: ax * dt, vy: ay * dt });
            k2x.push({ x: bodies[i].vx * dt, y: bodies[i].vy * dt });
        }

        for (let i = 0; i < n; i++) {
            bodies[i].x = orig[i].x + k2x[i].x * 0.5;
            bodies[i].y = orig[i].y + k2x[i].y * 0.5;
            bodies[i].vx = orig[i].vx + k2v[i].vx * 0.5;
            bodies[i].vy = orig[i].vy + k2v[i].vy * 0.5;
        }

        const k3v = [], k3x = [];
        for (let i = 0; i < n; i++) {
            let ax = 0, ay = 0;
            for (let j = 0; j < n; j++) {
                if (j !== i) {
                    const dx = bodies[j].x - bodies[i].x;
                    const dy = bodies[j].y - bodies[i].y;
                    const r = Math.sqrt(dx * dx + dy * dy);
                    const r3 = r * r * r;
                    ax += bodies[j].mass * dx / r3;
                    ay += bodies[j].mass * dy / r3;
                }
            }
            k3v.push({ vx: ax * dt, vy: ay * dt });
            k3x.push({ x: bodies[i].vx * dt, y: bodies[i].vy * dt });
        }

        for (let i = 0; i < n; i++) {
            bodies[i].x = orig[i].x + k3x[i].x;
            bodies[i].y = orig[i].y + k3x[i].y;
            bodies[i].vx = orig[i].vx + k3v[i].vx;
            bodies[i].vy = orig[i].vy + k3v[i].vy;
        }

        const k4v = [], k4x = [];
        for (let i = 0; i < n; i++) {
            let ax = 0, ay = 0;
            for (let j = 0; j < n; j++) {
                if (j !== i) {
                    const dx = bodies[j].x - bodies[i].x;
                    const dy = bodies[j].y - bodies[i].y;
                    const r = Math.sqrt(dx * dx + dy * dy);
                    const r3 = r * r * r;
                    ax += bodies[j].mass * dx / r3;
                    ay += bodies[j].mass * dy / r3;
                }
            }
            k4v.push({ vx: ax * dt, vy: ay * dt });
            k4x.push({ x: bodies[i].vx * dt, y: bodies[i].vy * dt });
        }

        for (let i = 0; i < n; i++) {
            trails[i].push({ x: orig[i].x, y: orig[i].y });
            bodies[i].x = orig[i].x + (k1x[i].x + 2*k2x[i].x + 2*k3x[i].x + k4x[i].x) / 6;
            bodies[i].y = orig[i].y + (k1x[i].y + 2*k2x[i].y + 2*k3x[i].y + k4x[i].y) / 6;
            bodies[i].vx = orig[i].vx + (k1v[i].vx + 2*k2v[i].vx + 2*k3v[i].vx + k4v[i].vx) / 6;
            bodies[i].vy = orig[i].vy + (k1v[i].vy + 2*k2v[i].vy + 2*k3v[i].vy + k4v[i].vy) / 6;
        }
    } else if (method === 'verlet') {
        const acc = [];
        for (let i = 0; i < n; i++) {
            let ax = 0, ay = 0;
            for (let j = 0; j < n; j++) {
                if (j !== i) {
                    const dx = bodies[j].x - bodies[i].x;
                    const dy = bodies[j].y - bodies[i].y;
                    const r = Math.sqrt(dx * dx + dy * dy);
                    const r3 = r * r * r;
                    ax += bodies[j].mass * dx / r3;
                    ay += bodies[j].mass * dy / r3;
                }
            }
            acc.push({ ax, ay });
        }

        for (let i = 0; i < n; i++) {
            trails[i].push({ x: bodies[i].x, y: bodies[i].y });
            bodies[i].x = bodies[i].x + bodies[i].vx * dt + 0.5 * acc[i].ax * dt * dt;
            bodies[i].y = bodies[i].y + bodies[i].vy * dt + 0.5 * acc[i].ay * dt * dt;
        }

        const newAcc = [];
        for (let i = 0; i < n; i++) {
            let ax = 0, ay = 0;
            for (let j = 0; j < n; j++) {
                if (j !== i) {
                    const dx = bodies[j].x - bodies[i].x;
                    const dy = bodies[j].y - bodies[i].y;
                    const r = Math.sqrt(dx * dx + dy * dy);
                    const r3 = r * r * r;
                    ax += bodies[j].mass * dx / r3;
                    ay += bodies[j].mass * dy / r3;
                }
            }
            newAcc.push({ ax, ay });
        }

        for (let i = 0; i < n; i++) {
            bodies[i].vx += 0.5 * (acc[i].ax + newAcc[i].ax) * dt;
            bodies[i].vy += 0.5 * (acc[i].ay + newAcc[i].ay) * dt;
        }
    }
}

function drawTrailsOnCanvas(ctx, trails, width, height) {
    const scale = 80;
    const offsetX = width / 2;
    const offsetY = height / 2;

    trails.forEach((trail, index) => {
        if (trail.length < 2) return;

        const colors = ['#ff6464', '#64ff64', '#6464ff'];
        ctx.beginPath();
        const first = { sx: trail[0].x * scale + offsetX, sy: -trail[0].y * scale + offsetY };
        ctx.moveTo(first.sx, first.sy);

        for (let i = 1; i < trail.length; i++) {
            const sx = trail[i].x * scale + offsetX;
            const sy = -trail[i].y * scale + offsetY;
            ctx.lineTo(sx, sy);
        }

        ctx.strokeStyle = colors[index] + '60';
        ctx.lineWidth = 2;
        ctx.stroke();
    });
}

function drawBodiesOnCanvas(ctx, bodies, width, height) {
    const scale = 80;
    const offsetX = width / 2;
    const offsetY = height / 2;

    bodies.forEach(body => {
        const sx = body.x * scale + offsetX;
        const sy = -body.y * scale + offsetY;
        const radius = Math.max(5, Math.sqrt(body.mass) * 5);

        ctx.beginPath();
        ctx.arc(sx, sy, radius, 0, Math.PI * 2);
        ctx.fillStyle = body.color;
        ctx.fill();
    });
}

function drawEnergyComparison() {
    const canvas = document.getElementById('canvas4');
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const bodies = [
        { mass: parseFloat(document.getElementById('m1').value), x: parseFloat(document.getElementById('x1').value), y: parseFloat(document.getElementById('y1').value), vx: parseFloat(document.getElementById('vx1').value), vy: parseFloat(document.getElementById('vy1').value) },
        { mass: parseFloat(document.getElementById('m2').value), x: parseFloat(document.getElementById('x2').value), y: parseFloat(document.getElementById('y2').value), vx: parseFloat(document.getElementById('vx2').value), vy: parseFloat(document.getElementById('vy2').value) },
        { mass: parseFloat(document.getElementById('m3').value), x: parseFloat(document.getElementById('x3').value), y: parseFloat(document.getElementById('y3').value), vx: parseFloat(document.getElementById('vx3').value), vy: parseFloat(document.getElementById('vy3').value) }
    ];

    const dt = parseFloat(document.getElementById('timeStep').value);
    const steps = 2000;
    const methods = ['euler', 'rk4', 'verlet'];
    const colors = ['#ff6464', '#64ff64', '#6464ff'];

    methods.forEach((method, mIndex) => {
        const simBodies = bodies.map(b => ({ ...b }));
        const energies = [];

        for (let i = 0; i < steps; i++) {
            let ke = 0;
            let pe = 0;

            simBodies.forEach(body => {
                ke += 0.5 * body.mass * (body.vx * body.vx + body.vy * body.vy);
            });

            for (let i = 0; i < simBodies.length; i++) {
                for (let j = i + 1; j < simBodies.length; j++) {
                    const dx = simBodies[j].x - simBodies[i].x;
                    const dy = simBodies[j].y - simBodies[i].y;
                    const r = Math.sqrt(dx * dx + dy * dy);
                    pe -= simBodies[i].mass * simBodies[j].mass / r;
                }
            }

            energies.push(ke + pe);
            stepMethod(simBodies, method, dt, [[], [], []]);
        }

        const maxE = Math.max(...energies);
        const minE = Math.min(...energies);
        const range = maxE - minE || 1;

        ctx.beginPath();
        const startX = 0;
        const startY = canvas.height - ((energies[0] - minE) / range) * (canvas.height - 40) - 20;
        ctx.moveTo(startX, startY);

        for (let i = 1; i < energies.length; i++) {
            const x = (i / (steps - 1)) * canvas.width;
            const y = canvas.height - ((energies[i] - minE) / range) * (canvas.height - 40) - 20;
            ctx.lineTo(x, y);
        }

        ctx.strokeStyle = colors[mIndex];
        ctx.lineWidth = 2.5;
        ctx.stroke();
    });

    ctx.fillStyle = '#ffffff';
    ctx.font = '14px Arial';
    ctx.fillText('能量守恒对比', 12, 24);
}
