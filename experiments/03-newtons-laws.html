<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牛顿定律虚拟物理实验室</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--cyan:#58a6ff;--green:#3fb950;--orange:#d29922;--red:#f85149;--purple:#a371f7;--yellow:#e3b341;--pink:#db61a2}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,'Segoe UI','Microsoft YaHei',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
/* Header */
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.back-btn{color:var(--text2);text-decoration:none;font-size:14px;display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;transition:all .2s}
.back-btn:hover{color:var(--text);background:var(--bg3)}
.back-btn::before{content:'';display:inline-block;width:8px;height:8px;border-left:2px solid currentColor;border-bottom:2px solid currentColor;transform:rotate(45deg)}
.header h1{font-size:18px;font-weight:600;background:linear-gradient(135deg,var(--cyan),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.badge{padding:3px 12px;border-radius:12px;font-size:11px;background:var(--bg3);color:var(--text2);margin-left:auto}
/* Tabs */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;padding:0 12px;gap:2px}
.tab{padding:10px 20px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;user-select:none;font-family:inherit}
.tab:hover{color:var(--text);background:var(--bg3)}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
/* Main layout */
.main{display:flex;flex:1;overflow:hidden}
.canvas-wrap{flex:1;position:relative;background:var(--bg);overflow:hidden}
#canvas{width:100%;height:100%;display:block}
.panel{width:310px;background:var(--bg2);border-left:1px solid var(--border);padding:16px;overflow-y:auto;flex-shrink:0}
.panel::-webkit-scrollbar{width:4px}
.panel::-webkit-scrollbar-track{background:transparent}
.panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.panel-title{font-size:13px;color:var(--text2);margin-bottom:12px;font-weight:500;letter-spacing:.5px}
.btn-row{display:flex;gap:8px;margin-bottom:14px}
.btn{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit;flex:1}
.btn-play{background:var(--green);color:#fff}
.btn-play:hover{box-shadow:0 0 16px rgba(63,185,80,.35)}
.btn-play.active{background:var(--orange)}
.btn-reset{background:var(--bg3);color:var(--text)}
.btn-reset:hover{background:var(--border)}
.ctrl-group{margin-bottom:14px}
.ctrl-group label{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:4px}
.ctrl-group label span{color:var(--cyan);font-weight:500;font-family:'JetBrains Mono',monospace}
input[type=range]{width:100%;height:4px;-webkit-appearance:none;appearance:none;background:var(--bg3);border-radius:2px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--cyan);border:2px solid var(--bg2);cursor:pointer;transition:box-shadow .2s}
input[type=range]::-webkit-slider-thumb:hover{box-shadow:0 0 12px rgba(88,166,255,.4)}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--cyan);border:2px solid var(--bg2);cursor:pointer}
input[type=range].accent-green::-webkit-slider-thumb{background:var(--green)}
input[type=range].accent-green::-moz-range-thumb{background:var(--green)}
input[type=range].accent-orange::-webkit-slider-thumb{background:var(--orange)}
input[type=range].accent-orange::-moz-range-thumb{background:var(--orange)}
input[type=range].accent-red::-webkit-slider-thumb{background:var(--red)}
input[type=range].accent-red::-moz-range-thumb{background:var(--red)}
input[type=range].accent-purple::-webkit-slider-thumb{background:var(--purple)}
input[type=range].accent-purple::-moz-range-thumb{background:var(--purple)}
select{width:100%;padding:6px 10px;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:inherit;cursor:pointer;outline:none}
select:focus{border-color:var(--cyan)}
.readout{border-top:1px solid var(--border);padding-top:12px;margin-top:4px}
.readout-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0}
.readout-row .label{color:var(--text2)}
.readout-row .value{font-family:'JetBrains Mono',monospace;font-weight:500}
.val-cyan{color:var(--cyan)}.val-green{color:var(--green)}.val-orange{color:var(--orange)}
.val-red{color:var(--red)}.val-purple{color:var(--purple)}.val-yellow{color:var(--yellow)}.val-pink{color:var(--pink)}
.legend{display:flex;flex-wrap:wrap;gap:8px;padding-top:8px}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.legend-dot{width:10px;height:3px;border-radius:2px}
.conclusion{background:var(--bg3);border-radius:8px;padding:12px;margin-top:12px;font-size:12px;color:var(--text2);line-height:1.6;border-left:3px solid var(--cyan)}
.conclusion strong{color:var(--text)}
.chart-area{margin-top:8px;background:var(--bg);border-radius:6px;padding:8px;position:relative;height:110px}
.chart-area canvas{width:100%;height:100%;display:block}
@media(max-width:820px){.main{flex-direction:column}.panel{width:100%;max-height:45vh;border-left:none;border-top:1px solid var(--border)}}
</style>
</head>
<body>

<div class="header">
  <a href="../index.html" class="back-btn">返回</a>
  <h1>牛顿定律虚拟物理实验室</h1>
  <span class="badge">Newton's Laws</span>
</div>

<div class="tabs">
  <div class="tab active" data-tab="1">牛顿第一定律 · 惯性</div>
  <div class="tab" data-tab="2">牛顿第二定律 · F=ma</div>
  <div class="tab" data-tab="3">牛顿第三定律 · 作用与反作用</div>
</div>

<div class="main">
  <div class="canvas-wrap"><canvas id="canvas"></canvas></div>
  <div class="panel" id="panel">
    <!-- 内容由JS动态渲染 -->
  </div>
</div>

<script>
// ============================================================
// 核心引擎
// ============================================================
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
const panel=document.getElementById('panel');
const tabs=document.querySelectorAll('.tab');
let W,H,activeTab=1,dpr=1;
let animId=null,lastTime=0,running=false;

function resize(){
  const r=canvas.parentElement.getBoundingClientRect();
  dpr=window.devicePixelRatio||1;
  W=r.width;H=r.height;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  // Update current law layout
  if(activeTab===1){law1.groundY=H*0.65;law1.blockX=W*0.15}
  else if(activeTab===2){law2.groundY=H*0.55;law2.cartX=W*0.12}
  else if(activeTab===3){law3.groundY=H*0.6}
}
window.addEventListener('resize',resize);

// ============================================================
// 工具函数
// ============================================================
function drawArrow(x1,y1,x2,y2,color,label,w=2.5){
  const dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy);
  if(len<2)return;
  const nx=dx/len,ny=dy/len,hl=10;
  ctx.save();
  ctx.strokeStyle=color;ctx.lineWidth=w;ctx.globalAlpha=.9;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.globalAlpha=1;ctx.fillStyle=color;
  ctx.beginPath();ctx.moveTo(x2,y2);
  ctx.lineTo(x2-hl*(nx*.92-ny*.38),y2-hl*(ny*.92+nx*.38));
  ctx.lineTo(x2-hl*(nx*.92+ny*.38),y2-hl*(ny*.92-nx*.38));
  ctx.closePath();ctx.fill();
  if(label){
    ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillStyle=color;ctx.fillText(label,x2+dx/len*18,y2+dy/len*18);
  }
  ctx.restore();
}

function drawGrid(){
  ctx.save();
  ctx.strokeStyle='rgba(48,54,61,0.25)';ctx.lineWidth=1;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  ctx.restore();
}

// ============================================================
// 第一定律：惯性/摩擦
// ============================================================
const law1={
  mass:5,v0:8,mu:.15,speed:1,
  surfaces:[
    {name:'冰面 (μ=0.05)',mu:.05},
    {name:'光滑地板 (μ=0.15)',mu:.15},
    {name:'木地板 (μ=0.30)',mu:.30},
    {name:'粗糙路面 (μ=0.50)',mu:.50},
  ],
  state:{x:0,v:0,t:0,started:false,records:[]},
  groundY:0,blockX:120,
  init(){
    this.groundY=H*0.65;
    this.blockX=W*0.15;
    this.reset();
  },
  reset(){
    this.state={x:0,v:0,t:0,started:false,records:[]};
  },
  start(){
    this.state.started=true;
    this.state.v=this.v0;
    this.state.t=0;
    this.state.records=[];
  },
  update(dt){
    const s=this.state;
    if(!s.started)return;
    const mu=this.mu,g=9.8;
    const a=-Math.sign(s.v||1)*mu*g;
    s.v+=a*dt;
    s.x+=s.v*dt;
    s.t+=dt;
    if(s.v<=0&&s.x>0){s.v=0;s.started=false}
    if(s.x<0)s.x=0;
    if(s.t<=20&&s.t>0)s.records.push({t:s.t,v:s.v});
  },
  draw(){
    const s=this.state,gy=this.groundY,bx=this.blockX+s.x,bw=50,bh=36;
    drawGrid();
    // Ground
    ctx.fillStyle='#21262d';ctx.fillRect(0,gy+bh,W,50);
    ctx.fillStyle='#30363d';ctx.fillRect(0,gy+bh,W,2);
    // Surface label
    const surf=this.surfaces.find(sf=>sf.mu===this.mu)||this.surfaces[1];
    ctx.fillStyle='rgba(139,148,158,0.5)';ctx.font='12px sans-serif';ctx.textAlign='center';
    ctx.fillText('表面: '+surf.name, W/2, gy+bh+30);
    // Block
    const grad=ctx.createLinearGradient(bx,gy,bx+bw,gy+bh);
    grad.addColorStop(0,'#1f6feb');grad.addColorStop(1,'#58a6ff');
    ctx.fillStyle=grad;roundRect(ctx,bx,gy,bw,bh,4);
    ctx.strokeStyle='rgba(88,166,255,0.4)';ctx.lineWidth=1;roundRect(ctx,bx,gy,bw,bh,4,true);
    ctx.fillStyle='#fff';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('物体',bx+bw/2,gy+bh/2);
    // Velocity arrow
    if(Math.abs(s.v)>.05){
      const cx=bx+bw/2,cy=gy+bh/2,scale=3;
      drawArrow(cx,cy-16,cx+s.v*scale,cy-16,'#3fb950','v='+s.v.toFixed(1)+' m/s',2);
    }
    // Info
    ctx.font='13px sans-serif';ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillStyle='rgba(139,148,158,0.6)';
    ctx.fillText('初速度: '+this.v0.toFixed(1)+' m/s | 摩擦系数: μ='+this.mu.toFixed(2), 20, 20);
    // Status
    if(!s.started&&s.x===0){
      ctx.fillStyle='rgba(139,148,158,0.4)';ctx.font='15px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('点击"运行"或按空格键 释放物体',W/2,H/2-40);
    }else if(!s.started&&s.v<=0&&s.x>0){
      ctx.fillStyle='rgba(63,185,80,0.7)';ctx.font='15px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('✓ 物体因摩擦力而停止',W/2,50);
      ctx.fillStyle='rgba(139,148,158,0.5)';ctx.font='13px sans-serif';
      ctx.fillText('滑行距离: '+s.x.toFixed(1)+' m | 滑行时间: '+s.t.toFixed(2)+' s',W/2,75);
    }
  }
};

// ============================================================
// 第二定律：F=ma 小车加速 + v-t图
// ============================================================
const law2={
  force:20,mass:5,speed:1,
  state:{x:0,v:0,t:0,running:false,records:[],lastA:0},
  groundY:0,cartX:100,
  init(){
    this.groundY=H*0.55;
    this.cartX=W*0.12;
    this.reset();
  },
  reset(){
    this.state={x:0,v:0,t:0,running:false,records:[],lastA:0};
  },
  update(dt){
    const s=this.state;
    if(!s.running)return;
    const a=this.force/this.mass;
    s.v+=a*dt;
    s.x+=s.v*dt;
    s.t+=dt;
    s.lastA=a;
    if(s.t<=30)s.records.push({t:s.t,v:s.v,a:a});
    if(s.x>W*1.5){s.running=false}
  },
  draw(){
    const s=this.state,gy=this.groundY,cw=70,ch=34;
    // Graph region (right side)
    const gx=W*0.55,gw=W*0.4,gh=H*0.32,gpad=8;
    // Ground
    ctx.fillStyle='#21262d';ctx.fillRect(0,gy+ch,W,40);
    ctx.fillStyle='#30363d';ctx.fillRect(0,gy+ch,W,2);
    // Cart
    const bx=this.cartX+s.x;
    ctx.fillStyle='#d29922';roundRect(ctx,bx,gy,cw,ch,4);
    ctx.strokeStyle='rgba(210,153,34,0.4)';ctx.lineWidth=1;roundRect(ctx,bx,gy,cw,ch,4,true);
    // Wheels
    ctx.fillStyle='#8b949e';
    ctx.beginPath();ctx.arc(bx+14,gy+ch+5,6,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(bx+cw-14,gy+ch+5,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('m='+this.mass.toFixed(1)+'kg',bx+cw/2,gy+ch/2);
    // Force arrows
    const cx=bx+cw/2,cy=gy+ch/2,fScale=.6;
    if(s.running||this.force>0){
      drawArrow(cx-10,cy,cx+this.force*fScale,cy,'#d29922','F='+this.force.toFixed(1)+'N');
    }
    if(s.running&&Math.abs(s.v)>.05){
      drawArrow(cx,cy-24,cx+s.v*4,cy-24,'#3fb950','v');
    }
    if(s.running){
      drawArrow(cx,cy+18,cx+s.lastA*20,cy+18,'#a371f7','a='+s.lastA.toFixed(2)+'m/s²');
    }
    // v-t Graph
    if(s.records.length>1){
      const graphX=W*0.58,graphY=20,graphW=W*0.35,graphH=H*0.25;
      ctx.save();
      ctx.fillStyle='rgba(22,27,34,.85)';roundRect(ctx,graphX-8,graphY-8,graphW+16,graphH+16,8);
      ctx.fillStyle='#0d1117';roundRect(ctx,graphX,graphY,graphW,graphH,4);
      ctx.strokeStyle='rgba(48,54,61,.5)';ctx.lineWidth=1;roundRect(ctx,graphX,graphY,graphW,graphH,4,true);
      // Title
      ctx.fillStyle='var(--text2)';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
      ctx.fillText('v - t 图像',graphX+graphW/2,graphY-4);
      // Scales
      const maxV=Math.max(...s.records.map(r=>r.v),1);
      const maxT=s.records[s.records.length-1].t||1;
      const vScale=graphH/maxV,tScale=graphW/maxT;
      // Axes
      ctx.strokeStyle='#8b949e';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(graphX,graphY+graphH);ctx.lineTo(graphX+graphW,graphY+graphH);ctx.stroke();
      ctx.beginPath();ctx.moveTo(graphX,graphY+graphH);ctx.lineTo(graphX,graphY);ctx.stroke();
      // Labels
      ctx.fillStyle='rgba(139,148,158,0.5)';ctx.font='9px sans-serif';ctx.textAlign='right';ctx.textBaseline='middle';
      ctx.fillText(maxV.toFixed(1),graphX-4,graphY);
      ctx.fillText('0',graphX-4,graphY+graphH);
      // Plot
      ctx.strokeStyle='#3fb950';ctx.lineWidth=2;
      ctx.beginPath();
      s.records.forEach((r,i)=>{
        const px=graphX+r.t*tScale,py=graphY+graphH-r.v*vScale;
        i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
      });
      ctx.stroke();
      // Current point
      if(s.records.length>0){
        const last=s.records[s.records.length-1];
        const px=graphX+last.t*tScale,py=graphY+graphH-last.v*vScale;
        ctx.fillStyle='#3fb950';ctx.beginPath();ctx.arc(px,py,4,0,Math.PI*2);ctx.fill();
      }
      ctx.restore();
    }
    // Formula display
    if(s.running||s.t>0){
      ctx.save();
      ctx.fillStyle='rgba(139,148,158,0.5)';ctx.font='13px sans-serif';ctx.textAlign='left';ctx.textBaseline='bottom';
      ctx.fillText('a = F/m = '+this.force.toFixed(1)+'/'+this.mass.toFixed(1)+' = '+(this.force/this.mass).toFixed(2)+' m/s²',20,H-20);
      ctx.restore();
    }
  }
};

// ============================================================
// 第三定律：作用力与反作用力（碰撞）
// ============================================================
const law3={
  m1:3,m2:3,v1:4,v2:-2,collisionType:'elastic',speed:1,
  state:{x1:0,x2:0,v1:0,v2:0,t:0,running:false,collided:false,records:[]},
  groundY:0,
  init(){
    this.groundY=H*0.6;
    this.reset();
  },
  reset(){
    this.state={
      x1:0,x2:W*0.6,
      v1:this.v1,v2:this.v2,
      t:0,running:false,collided:false,
      records:[]
    };
  },
  start(){
    this.state.running=true;
    this.state.collided=false;
    this.state.records=[];
  },
  update(dt){
    const s=this.state;
    if(!s.running)return;
    const margin=20;
    // Check collision
    if(s.x2-s.x1<110&&!s.collided){
      s.collided=true;
      // Record pre-collision
      const pBefore=this.m1*s.v1+this.m2*s.v2;
      // Collision calculation
      if(this.collisionType==='elastic'){
        // Elastic: conserve KE and momentum
        const m1=this.m1,m2=this.m2;
        const u1=s.v1,u2=s.v2;
        s.v1=((m1-m2)*u1+2*m2*u2)/(m1+m2);
        s.v2=((m2-m1)*u2+2*m1*u1)/(m1+m2);
      }else{
        // Inelastic: stick together
        const m1=this.m1,m2=this.m2;
        const totalP=m1*s.v1+m2*s.v2;
        const totalM=m1+m2;
        const vf=totalP/totalM;
        s.v1=vf;s.v2=vf;
      }
      const pAfter=this.m1*s.v1+this.m2*s.v2;
      s.records.push({t:s.t,pBefore,pAfter,type:this.collisionType});
    }
    s.x1+=s.v1*dt;
    s.x2+=s.v2*dt;
    s.t+=dt;
    // Bounds
    if(s.x1<margin){s.x1=margin;s.v1=Math.abs(s.v1)}
    if(s.x2>W-margin-70){s.x2=W-margin-70;s.v2=-Math.abs(s.v2)}
  },
  draw(){
    const s=this.state,gy=this.groundY,h=50;
    // Ground
    ctx.fillStyle='#21262d';ctx.fillRect(0,gy+h,W,40);
    ctx.fillStyle='#30363d';ctx.fillRect(0,gy+h,W,2);
    // Object 1 (left)
    const w1=50,x1=W*0.15+s.x1;
    const g1=ctx.createLinearGradient(x1,gy,x1+w1,gy+h);
    g1.addColorStop(0,'#f85149');g1.addColorStop(1,'#ff7b72');
    ctx.fillStyle=g1;roundRect(ctx,x1,gy,w1,h,6);
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('m₁='+this.m1.toFixed(1)+'kg',x1+w1/2,gy+h/2);
    // Object 2 (right)
    const w2=50,x2=W*0.25+s.x2;
    const g2=ctx.createLinearGradient(x2,gy,x2+w2,gy+h);
    g2.addColorStop(0,'#58a6ff');g2.addColorStop(1,'#79c0ff');
    ctx.fillStyle=g2;roundRect(ctx,x2,gy,w2,h,6);
    ctx.fillText('m₂='+this.m2.toFixed(1)+'kg',x2+w2/2,gy+h/2);
    // Velocity arrows
    const c1x=x1+w1/2,c1y=gy+h/2;
    const c2x=x2+w2/2,c2y=gy+h/2;
    if(s.running||true){
      if(Math.abs(s.v1)>.05)
        drawArrow(c1x,c1y-22,c1x+s.v1*5,c1y-22,'#f85149','v₁='+s.v1.toFixed(1));
      if(Math.abs(s.v2)>.05)
        drawArrow(c2x,c2y-22,c2x+s.v2*5,c2y-22,'#58a6ff','v₂='+s.v2.toFixed(1));
    }
    // Collision force vectors
    if(s.collided&&s.running){
      const dist=x2-x1;
      if(dist<100){
        drawArrow(c1x+w1/2,c1y,c1x+w1/2+40,c1y,'#ff7b72','F₁₂');
        drawArrow(c2x-w2/2,c2y,c2x-w2/2-40,c2y,'#79c0ff','F₂₁');
        ctx.fillStyle='rgba(163,113,247,0.7)';ctx.font='11px sans-serif';ctx.textAlign='center';
        ctx.fillText('F₁₂ = -F₂₁  ✓ 作用力 = 反作用力',W/2,gy+h+20);
      }
    }
    // Momentum info
    const p1=this.m1*Math.abs(s.v1||0),p2=this.m2*Math.abs(s.v2||0);
    const pTotal=p1+p2;
    ctx.fillStyle='rgba(139,148,158,0.5)';ctx.font='12px sans-serif';ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText('动量 p₁='+p1.toFixed(2)+' kg·m/s  p₂='+p2.toFixed(2)+' kg·m/s  总动量='+pTotal.toFixed(2)+' kg·m/s',20,20);
    // Collision result
    if(s.collided&&!s.running){
      ctx.fillStyle='rgba(163,113,247,0.7)';ctx.font='15px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('✓ 碰撞完成 | '+(this.collisionType==='elastic'?'弹性碰撞 (动能守恒)':'非弹性碰撞 (粘合)'),W/2,50);
    }
  }
};

// roundRect polyfill for older browsers
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(r>w/2)r=w/2;if(r>h/2)r=h/2;
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);
    this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);
    this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);
    this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();return this;
  };
}

function roundRect(c,x,y,w,h,r,strokeOnly){
  if(strokeOnly){c.beginPath();c.roundRect(x,y,w,h,r);c.stroke();return}
  c.beginPath();c.roundRect(x,y,w,h,r);c.fill();
}

// ============================================================
// 主循环
// ============================================================
function updateReadouts(){
  if(activeTab===1){
    const s=law1.state;
    const mu=law1.mu,g=9.8;
    const ff=s.started?Math.abs(mu*g*law1.mass):0;
    document.getElementById('r1v')&&(document.getElementById('r1v').textContent=Math.abs(s.v).toFixed(2)+' m/s');
    document.getElementById('r1x')&&(document.getElementById('r1x').textContent=s.x.toFixed(2)+' m');
    document.getElementById('r1t')&&(document.getElementById('r1t').textContent=s.t.toFixed(2)+' s');
    document.getElementById('r1f')&&(document.getElementById('r1f').textContent=ff.toFixed(2)+' N');
  }else if(activeTab===2){
    const s=law2.state;
    document.getElementById('r2a')&&(document.getElementById('r2a').textContent=s.lastA.toFixed(2)+' m/s²');
    document.getElementById('r2v')&&(document.getElementById('r2v').textContent=s.v.toFixed(2)+' m/s');
    document.getElementById('r2x')&&(document.getElementById('r2x').textContent=s.x.toFixed(2)+' m');
    document.getElementById('r2t')&&(document.getElementById('r2t').textContent=s.t.toFixed(2)+' s');
  }else if(activeTab===3){
    const s=law3.state;
    document.getElementById('r3v1')&&(document.getElementById('r3v1').textContent=s.v1.toFixed(2)+' m/s');
    document.getElementById('r3v2')&&(document.getElementById('r3v2').textContent=s.v2.toFixed(2)+' m/s');
    const p1=law3.m1*Math.abs(s.v1||0),p2=law3.m2*Math.abs(s.v2||0);
    document.getElementById('r3p1')&&(document.getElementById('r3p1').textContent=p1.toFixed(2)+' kg·m/s');
    document.getElementById('r3p2')&&(document.getElementById('r3p2').textContent=p2.toFixed(2)+' kg·m/s');
    document.getElementById('r3pt')&&(document.getElementById('r3pt').textContent=(p1+p2).toFixed(2)+' kg·m/s');
  }
}

function mainLoop(t){
  animId=requestAnimationFrame(mainLoop);
  if(lastTime===0)lastTime=t;
  let ft=(t-lastTime)/1000;lastTime=t;
  if(ft>.1)ft=.1;
  const FIXED_DT=1/60;

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0d1117';ctx.fillRect(0,0,W,H);

  if(activeTab===1){
    if(running){
      const steps=Math.ceil(ft*law1.speed/FIXED_DT);
      for(let i=0;i<steps;i++)law1.update(FIXED_DT);
    }
    law1.draw();
  }else if(activeTab===2){
    if(running){
      const steps=Math.ceil(ft*law2.speed/FIXED_DT);
      for(let i=0;i<steps;i++)law2.update(FIXED_DT);
    }
    law2.draw();
  }else if(activeTab===3){
    if(running){
      const steps=Math.ceil(ft*law3.speed/FIXED_DT);
      for(let i=0;i<steps;i++)law3.update(FIXED_DT);
    }
    law3.draw();
  }
  updateReadouts();
}

// ============================================================
// Tab切换
// ============================================================
function switchTab(tab){
  activeTab=tab;
  tabs.forEach(t=>t.classList.toggle('active',+t.dataset.tab===tab));
  running=false;
  if(activeTab===1)law1.init();
  else if(activeTab===2)law2.init();
  else if(activeTab===3)law3.init();
  renderPanel();
}

tabs.forEach(t=>t.addEventListener('click',()=>switchTab(+t.dataset.tab)));

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='Space'){
    e.preventDefault();
    running=!running;
    if(activeTab===1&&!law1.state.started&&running)law1.start();
    else if(activeTab===2&&!law2.state.running&&running)law2.state.running=true;
    else if(activeTab===3&&!law3.state.running&&running)law3.start();
    updatePlayBtn();
  }
  if(e.key==='r'||e.key==='R'){
    running=false;updatePlayBtn();
    if(activeTab===1)law1.reset();
    else if(activeTab===2)law2.reset();
    else if(activeTab===3)law3.reset();
  }
});

// ============================================================
// 启动
// ============================================================
resize();law1.init();renderPanel();lastTime=0;mainLoop(0);
</script>
